<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>紐西蘭自駕冒險指南 - iOS Premium Planner</title>
  <!-- SEO & PWA Meta -->
  <meta name="description" content="專為紐西蘭自駕設計的互動式旅遊指南網頁，採用 Apple 設計美學，支援離線快取與即時就地編輯。">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="紐西蘭自駕">
  <link rel="apple-touch-icon" href="icon.png?v=13">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700;800&family=SF+Pro+Text:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <div class="app-container">
    <!-- Apple Header -->
    <header class="app-header">
      <div class="brand">
        <div class="logo-icon">
          <img src="icon.png?v=13" alt="Logo">
        </div>
        <div class="brand-text">
          <h1>紐西蘭自駕冒險</h1>
          <p>🇳🇿 NZ RoadTrip Planner 2027</p>
        </div>
      </div>
      
      <div class="header-actions">
        <button id="add-day-btn" class="ios-btn ios-btn-primary" title="新增天數">
          <i class="fa-solid fa-plus"></i> <span>新增一天</span>
        </button>
        <button id="reset-btn" class="ios-btn ios-btn-secondary" title="還原預設">
          <i class="fa-solid fa-rotate-left"></i>
        </button>
        <button id="export-btn" class="ios-btn ios-btn-secondary" title="匯出 JSON">
          <i class="fa-solid fa-arrow-up-from-bracket"></i>
        </button>
        <label for="import-file" class="ios-btn ios-btn-secondary btn-file" title="匯入 JSON">
          <i class="fa-solid fa-arrow-down-to-bracket"></i>
          <input type="file" id="import-file" accept=".json" style="display: none;">
        </label>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="app-workspace">
      <!-- Map Section -->
      <section class="workspace-map-panel">
        <div class="map-card-wrapper">
          <div id="map"></div>
          <!-- Map Overlay Control -->
          <div class="map-layer-control">
            <button id="layer-sat-btn" class="layer-btn active">衛星圖</button>
            <button id="layer-street-btn" class="layer-btn">街道圖</button>
          </div>
        </div>
      </section>

      <!-- Content Section -->
      <section class="workspace-content-panel">
        
        <!-- OVERVIEW PAGE -->
        <div id="overview-page" class="app-page active">
          <!-- iOS Stats Widget -->
          <div class="ios-widget stats-widget">
            <div class="widget-row">
              <div class="widget-item">
                <span class="widget-label">總天數</span>
                <span id="stat-total-days" class="widget-value">16</span>
              </div>
              <div class="widget-divider"></div>
              <div class="widget-item">
                <span class="widget-label">解鎖景點</span>
                <span id="stat-progress-val" class="widget-value">0 / 0</span>
              </div>
            </div>
            <div class="widget-progress-bar">
              <div id="stat-progress-fill" class="widget-progress-fill"></div>
            </div>
            <div class="widget-footer-cost">
              <i class="fa-solid fa-circle-info"></i> 預計 vs 實際總花費：<strong id="stat-cost-compare">NZ$ 0 / NZ$ 0</strong>
            </div>
          </div>

          <div class="section-title">行程路線總覽</div>
          
          <!-- Itinerary Cards -->
          <div id="itinerary-list" class="itinerary-list-container">
            <!-- Dynamically populated cards -->
          </div>
        </div>

        <!-- DETAIL PAGE -->
        <div id="detail-page" class="app-page">
          <!-- Back navigation -->
          <div class="detail-navigation">
            <button id="back-to-overview-btn" class="ios-back-btn">
              <i class="fa-solid fa-chevron-left"></i> 返回總覽
            </button>
            
            <button id="delete-day-btn" class="ios-btn ios-btn-danger-icon" title="刪除這天">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>

          <!-- iOS Hero Card with Inline Editing -->
          <div class="ios-hero-card">
            <div class="hero-badge-row">
              <span class="ios-badge">DAY <span id="detail-day-num">1</span></span>
              <!-- Inline Date Input -->
              <input type="text" id="detail-day-date-input" class="inline-date-input" placeholder="點擊填寫日期">
            </div>
            <!-- Inline Title Input -->
            <input type="text" id="detail-day-title-input" class="inline-title-input" placeholder="點擊輸入今日主題路線">
            
            <div class="route-location-row">
              <input type="text" id="detail-start-loc-input" class="inline-loc-input" placeholder="起點">
              <i class="fa-solid fa-arrow-right-long loc-arrow"></i>
              <input type="text" id="detail-end-loc-input" class="inline-loc-input" placeholder="終點">
            </div>
          </div>

          <!-- Details Cards Section -->
          <div class="details-section-grid">
            <!-- Checklist Card -->
            <div class="ios-card">
              <div class="card-header">
                <h3><i class="fa-solid fa-circle-check"></i> 今日踩點景點</h3>
                <button id="add-attraction-btn" class="ios-mini-add-btn"><i class="fa-solid fa-plus"></i></button>
              </div>
              <ul id="detail-attractions-list" class="ios-checklist">
                <!-- Dynamically populated -->
              </ul>
            </div>

            <!-- Budget & Metrics Card -->
            <div class="ios-card">
              <h3><i class="fa-solid fa-wallet"></i> 自駕花費 & 預算記錄</h3>
              <div class="metrics-grid">
                <div class="metric-row">
                  <span>行車時間 (預估)</span>
                  <input type="text" id="detail-est-time-input" class="inline-metric-input" placeholder="例如: 3.5小時">
                </div>
                <div class="metric-row">
                  <span>行車時間 (實際)</span>
                  <input type="text" id="detail-act-time-input" class="inline-metric-input" placeholder="例如: 4小時">
                </div>
                <div class="metric-row highlight-row">
                  <span>預計金額 (NZ$)</span>
                  <input type="number" id="detail-est-cost-input" class="inline-metric-input" placeholder="NZ$ 0">
                </div>
                <div class="metric-row highlight-row">
                  <span>實際金額 (NZ$)</span>
                  <input type="number" id="detail-act-cost-input" class="inline-metric-input" placeholder="NZ$ 0">
                </div>
              </div>
              <div id="detail-budget-status" class="budget-status-tag"></div>
            </div>

            <!-- Notes Card -->
            <div class="ios-card full-width-card">
              <h3><i class="fa-solid fa-note-sticky"></i> 自駕指南與備註</h3>
              <textarea id="detail-notes-input" class="inline-textarea-input" placeholder="點選此處開始填寫這天的路況注意事項、住宿或特色美食備註..."></textarea>
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>

  <!-- PWA Update Toast -->
  <div id="pwa-update-toast" class="pwa-toast">
    <div class="pwa-toast-content">
      <i class="fa-solid fa-cloud-arrow-down pwa-toast-icon"></i>
      <div class="pwa-toast-text">
        <h4>發現新版本！</h4>
        <p>行程工具已更新，立即載入最新功能。</p>
      </div>
    </div>
    <button id="pwa-update-btn" class="ios-btn ios-btn-primary btn-sm">立即更新</button>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="data.js?v=13"></script>
  <script src="app.js?v=13"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        let newWorker;
        const toast = document.getElementById('pwa-update-toast');
        const updateBtn = document.getElementById('pwa-update-btn');

        navigator.serviceWorker.register('./sw.js')
          .then(reg => {
            reg.update();
            setInterval(() => { reg.update(); }, 15000);
            reg.addEventListener('updatefound', () => {
              newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  toast.classList.add('show');
                }
              });
            });
          });

        navigator.serviceWorker.ready.then(reg => {
          if (reg.waiting) toast.classList.add('show');
        });

        updateBtn.addEventListener('click', () => {
          navigator.serviceWorker.getRegistration().then(reg => {
            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          });
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (!refreshing) {
            refreshing = true;
            window.location.reload();
          }
        });
      });
    }
  </script>
</body>
</html>
